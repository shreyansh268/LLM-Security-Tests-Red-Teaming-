name: Garak Ollama TinyLlama Security Tests

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Model name to test'
        required: false
        default: 'tinyllama'

jobs:
  security-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh

      - name: Start Ollama service
        run: |
          ollama serve &
          sleep 5

      - name: Pull TinyLlama model
        run: |
          ollama pull tinyllama

      - name: Install garak and dependencies
        run: |
          pip install --upgrade pip
          pip install garak

      - name: Run garak security probes
        run: |
          garak --model_type ollama --model_name tinyllama --probes test.Test --report-dir ./garak-reports

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: garak-security-reports
          path: ./garak-reports/
          retention-days: 5
